version: "2"

sql:
  - engine: "postgresql"
    schema: "db/migrations"
    queries: "db/query"
    gen:
      go:
        package: "query"
        out: "internal/db/query"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: true
        overrides:
          - column: "users.email"
            go_type:
              type: "string"
              pointer: true
          - column: "users.birth"
            go_type:
              import: "time"
              type: "Time"
              pointer: true
